name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 1,15 * *"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Normalize repository owner
      run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker image
      run: docker build --pull -t ghcr.io/${OWNER_LC}/frankenphp:latest .

    - name: Push Docker image
      run: docker push ghcr.io/${OWNER_LC}/frankenphp:latest
